# Only needed if you're running this on your own VPS/server and want Caddy
# to handle a custom domain + automatic HTTPS in front of it. On a
# PaaS (Railway/Render/Fly.io) you don't need this file at all — they build
# straight from ./Dockerfile and provide HTTPS themselves; see README.md.
services:
  backend:
    build: .
    restart: unless-stopped
    env_file:
      - ./backend/.env
    volumes:
      - market_data:/app  # persists market_system.db across container restarts/redeploys
    expose:
      - "8000"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - backend

volumes:
  market_data:
  caddy_data:
  caddy_config:
